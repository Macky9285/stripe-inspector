<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StripeInspector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Stripe<span>Inspector</span></h1>
            <p>Security research tool for Stripe API key enumeration</p>
        </div>

        <div class="input-section">
            <!-- Key input + Inspect button -->
            <div style="display:flex;gap:10px;">
                <div class="input-group" style="flex:1;">
                    <label>Stripe API Key</label>
                    <input type="text" id="keyInput" placeholder="sk_test_... or sk_live_..." autocomplete="off" spellcheck="false">
                </div>
                <button class="btn btn-primary" id="inspectBtn" style="align-self:flex-end;">Inspect</button>
            </div>

            <!-- Toolbar row -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <label class="toggle-switch" title="Fetch all pages instead of first 100">
                        <input type="checkbox" id="deepToggle">
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        <span class="toggle-label">Deep</span>
                    </label>
                    <span class="toolbar-divider"></span>
                    <span class="toolbar-link" id="modulesToggle" onclick="document.getElementById('modulesGrid').classList.toggle('open'); updateModulesCount();">
                        Modules: <span id="modulesCount">All selected</span> <span class="arrow">&#9662;</span>
                    </span>
                </div>
                <div class="toolbar-right">
                    <span class="toolbar-link" onclick="document.getElementById('tokenSection').classList.toggle('open')">
                        &#128274; Auth token
                    </span>
                </div>
            </div>

            <!-- Auth token (hidden by default) -->
            <div class="collapsible" id="tokenSection">
                <div class="input-group">
                    <input type="password" id="tokenInput" placeholder="Bearer token (for secured instances)" autocomplete="off">
                </div>
            </div>

            <!-- Modules grid (hidden by default) -->
            <div class="collapsible" id="modulesGrid">
                <div class="modules-grid-inner">
                    <span class="module-chip active" data-module="account" onclick="toggleChip(this)">account</span>
                    <span class="module-chip active" data-module="balance" onclick="toggleChip(this)">balance</span>
                    <span class="module-chip active" data-module="customers" onclick="toggleChip(this)">customers</span>
                    <span class="module-chip active" data-module="charges" onclick="toggleChip(this)">charges</span>
                    <span class="module-chip active" data-module="payment_intents" onclick="toggleChip(this)">payment_intents</span>
                    <span class="module-chip active" data-module="products" onclick="toggleChip(this)">products</span>
                    <span class="module-chip active" data-module="payouts" onclick="toggleChip(this)">payouts</span>
                    <span class="module-chip active" data-module="subscriptions" onclick="toggleChip(this)">subscriptions</span>
                    <span class="module-chip active" data-module="invoices" onclick="toggleChip(this)">invoices</span>
                    <span class="module-chip active" data-module="webhooks" onclick="toggleChip(this)">webhooks</span>
                    <span class="module-chip active" data-module="events" onclick="toggleChip(this)">events</span>
                    <span class="module-chip active" data-module="connected" onclick="toggleChip(this)">connected</span>
                    <span class="module-chip active" data-module="disputes" onclick="toggleChip(this)">disputes</span>
                    <span class="module-chip active" data-module="refunds" onclick="toggleChip(this)">refunds</span>
                    <span class="module-chip active" data-module="balance_transactions" onclick="toggleChip(this)">balance_transactions</span>
                    <span class="module-chip active" data-module="coupons" onclick="toggleChip(this)">coupons</span>
                    <span class="module-chip" data-module="permission_scan" onclick="toggleChip(this)">permission_scan</span>
                    <div class="modules-actions">
                        <button class="btn btn-outline btn-xs" onclick="toggleAllModules(true)">All</button>
                        <button class="btn btn-outline btn-xs" onclick="toggleAllModules(false)">None</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="status" id="status" style="display:none;"></div>

        <div class="results" id="results">
            <div id="resultsContent"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
