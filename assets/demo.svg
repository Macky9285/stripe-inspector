<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 680" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13">
  <style>
    .cmd { opacity:0; animation: fadeIn 0.3s forwards 0.5s; }

    /* Each scan line fades in then fades out, except the last one which stays until results */
    .s1 { opacity:0; animation: fadeIn 0.1s forwards 1.2s, fadeOut 0.1s forwards 1.5s; }
    .s2 { opacity:0; animation: fadeIn 0.1s forwards 1.5s, fadeOut 0.1s forwards 1.8s; }
    .s3 { opacity:0; animation: fadeIn 0.1s forwards 1.8s, fadeOut 0.1s forwards 2.1s; }
    .s4 { opacity:0; animation: fadeIn 0.1s forwards 2.1s, fadeOut 0.1s forwards 2.4s; }
    .s5 { opacity:0; animation: fadeIn 0.1s forwards 2.4s, fadeOut 0.1s forwards 2.7s; }
    .s6 { opacity:0; animation: fadeIn 0.1s forwards 2.7s, fadeOut 0.1s forwards 3.0s; }
    .s7 { opacity:0; animation: fadeIn 0.1s forwards 3.0s, fadeOut 0.1s forwards 3.3s; }
    .s8 { opacity:0; animation: fadeIn 0.1s forwards 3.3s, fadeOut 0.1s forwards 3.6s; }

    .result { opacity:0; animation: fadeIn 0.4s forwards; }
    .r1  { animation-delay: 3.8s; }
    .r2  { animation-delay: 4.0s; }
    .r3  { animation-delay: 4.2s; }
    .r4  { animation-delay: 4.4s; }
    .r5  { animation-delay: 4.8s; }
    .r6  { animation-delay: 5.0s; }
    .r7  { animation-delay: 5.4s; }
    .r8  { animation-delay: 5.6s; }
    .r9  { animation-delay: 6.0s; }
    .r10 { animation-delay: 6.4s; }

    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes fadeOut { from{opacity:1} to{opacity:0} }
  </style>

  <!-- Window -->
  <rect width="820" height="680" rx="12" fill="#0f1117"/>

  <!-- Title bar -->
  <rect width="820" height="38" rx="12" fill="#1a1d27"/>
  <rect y="26" width="820" height="12" fill="#1a1d27"/>
  <circle cx="20" cy="19" r="6" fill="#ef4444"/>
  <circle cx="40" cy="19" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="19" r="6" fill="#10b981"/>
  <text x="410" y="23" fill="#71717a" font-size="12" text-anchor="middle">stripe-inspector</text>

  <!-- Command line -->
  <g class="cmd">
    <text x="20" y="68" fill="#6c63ff" font-weight="bold">$</text>
    <text x="36" y="68" fill="#e4e4e7"> stripe-inspector inspect</text>
    <text x="280" y="68" fill="#f59e0b"> sk_live_51Abc...REDACTED</text>
  </g>

  <!-- Scanning lines — same position, each replaces the previous -->
  <text x="30" y="92" fill="#71717a" class="s1">* Scanning account...</text>
  <text x="30" y="92" fill="#71717a" class="s2">* Scanning balance...</text>
  <text x="30" y="92" fill="#71717a" class="s3">* Scanning customers...</text>
  <text x="30" y="92" fill="#71717a" class="s4">* Scanning charges...</text>
  <text x="30" y="92" fill="#71717a" class="s5">* Scanning products...</text>
  <text x="30" y="92" fill="#71717a" class="s6">* Scanning payouts...</text>
  <text x="30" y="92" fill="#71717a" class="s7">* Scanning webhooks...</text>
  <text x="30" y="92" fill="#71717a" class="s8">* Scanning events...</text>

  <!-- Results (all below y=108, scan line area is cleared by fadeOut) -->

  <!-- Header box -->
  <g class="result r1">
    <rect x="20" y="108" width="780" height="52" rx="6" fill="none" stroke="#3b3f54" stroke-width="1"/>
    <text x="290" y="126" fill="#6c63ff" font-size="12" font-weight="bold">StripeInspector</text>
    <text x="40" y="146" fill="#ef4444" font-weight="bold">LIVE KEY</text>
    <text x="120" y="146" fill="#a1a1aa">sk_live_...XXXX</text>
    <text x="560" y="146" fill="#52525b" font-size="11">2026-03-23 19:00:00 UTC</text>
  </g>

  <!-- Permissions -->
  <g class="result r2">
    <text x="20" y="182" fill="#e4e4e7" font-weight="bold">Permissions:</text>
    <text x="130" y="182" fill="#10b981">8 allowed</text>
    <text x="220" y="182" fill="#71717a">|</text>
    <text x="235" y="182" fill="#ef4444">0 denied</text>
    <text x="315" y="182" fill="#71717a">|</text>
    <text x="330" y="182" fill="#f59e0b">0 errors</text>
  </g>

  <!-- ACCOUNT section -->
  <text x="20" y="212" fill="#6c8dff" font-weight="bold" class="result r3">ACCOUNT</text>
  <g class="result r4" font-size="12">
    <text x="30" y="232" fill="#22d3ee">Account ID</text>
    <text x="230" y="232" fill="#e4e4e7">acct_1AbC2DeFgHiJkLmN</text>
    <text x="30" y="250" fill="#22d3ee">Business Name</text>
    <text x="230" y="250" fill="#e4e4e7">Acme Maritime Corp</text>
    <text x="30" y="268" fill="#22d3ee">Email</text>
    <text x="230" y="268" fill="#e4e4e7">admin@acmemaritime.com</text>
    <text x="30" y="286" fill="#22d3ee">Country</text>
    <text x="230" y="286" fill="#e4e4e7">US</text>
    <text x="30" y="304" fill="#22d3ee">Owner Name</text>
    <text x="230" y="304" fill="#e4e4e7">John Doe</text>
    <text x="30" y="322" fill="#22d3ee">Statement Descriptor</text>
    <text x="230" y="322" fill="#e4e4e7">ACMEMARITIME.COM</text>
    <text x="30" y="340" fill="#22d3ee">Capabilities</text>
    <text x="230" y="340" fill="#e4e4e7">card_payments, transfers</text>
  </g>

  <!-- BALANCE section -->
  <text x="20" y="370" fill="#6c8dff" font-weight="bold" class="result r5">BALANCE</text>
  <g class="result r6" font-size="12">
    <text x="30" y="390" fill="#71717a" font-weight="bold">Type</text>
    <text x="160" y="390" fill="#71717a" font-weight="bold">Amount</text>
    <text x="310" y="390" fill="#71717a" font-weight="bold">Currency</text>
    <text x="30" y="408" fill="#e4e4e7">Available</text>
    <text x="160" y="408" fill="#10b981">12,450.00</text>
    <text x="310" y="408" fill="#e4e4e7">USD</text>
    <text x="30" y="426" fill="#e4e4e7">Pending</text>
    <text x="160" y="426" fill="#f59e0b">3,200.50</text>
    <text x="310" y="426" fill="#e4e4e7">USD</text>
  </g>

  <!-- CUSTOMERS section -->
  <text x="20" y="456" fill="#6c8dff" font-weight="bold" class="result r7">CUSTOMERS</text>
  <g class="result r8" font-size="12">
    <text x="30" y="476" fill="#71717a" font-weight="bold">ID</text>
    <text x="210" y="476" fill="#71717a" font-weight="bold">Name</text>
    <text x="380" y="476" fill="#71717a" font-weight="bold">Email</text>
    <text x="600" y="476" fill="#71717a" font-weight="bold">Country</text>
    <text x="30" y="494" fill="#e4e4e7">cus_9xK2mPqR4wT1nZ</text>
    <text x="210" y="494" fill="#e4e4e7">Sarah Johnson</text>
    <text x="380" y="494" fill="#e4e4e7">sarah@example.com</text>
    <text x="600" y="494" fill="#e4e4e7">US</text>
    <text x="30" y="512" fill="#e4e4e7">cus_8bN5vLkJ3hG7yX</text>
    <text x="210" y="512" fill="#e4e4e7">Mike Chen</text>
    <text x="380" y="512" fill="#e4e4e7">mike.chen@corp.io</text>
    <text x="600" y="512" fill="#e4e4e7">CA</text>
    <text x="30" y="530" fill="#e4e4e7">cus_7aM4uKjI2gF6xW</text>
    <text x="210" y="530" fill="#e4e4e7">Elena Rodriguez</text>
    <text x="380" y="530" fill="#e4e4e7">elena@startup.dev</text>
    <text x="600" y="530" fill="#e4e4e7">ES</text>
    <text x="30" y="550" fill="#52525b" font-size="11">Showing 3 of 847</text>
  </g>

  <!-- CHARGES section -->
  <text x="20" y="580" fill="#6c8dff" font-weight="bold" class="result r9">CHARGES</text>
  <g class="result r10" font-size="12">
    <text x="30" y="600" fill="#71717a" font-weight="bold">ID</text>
    <text x="190" y="600" fill="#71717a" font-weight="bold">Amount</text>
    <text x="310" y="600" fill="#71717a" font-weight="bold">Payer</text>
    <text x="490" y="600" fill="#71717a" font-weight="bold">Card</text>
    <text x="30" y="618" fill="#e4e4e7">ch_3Qx9BcDE...</text>
    <text x="190" y="618" fill="#10b981">$2,500.00</text>
    <text x="310" y="618" fill="#e4e4e7">Sarah Johnson</text>
    <text x="490" y="618" fill="#e4e4e7">**** 4242</text>
    <text x="30" y="636" fill="#e4e4e7">ch_3Qx8AcCD...</text>
    <text x="190" y="636" fill="#10b981">$750.00</text>
    <text x="310" y="636" fill="#e4e4e7">Mike Chen</text>
    <text x="490" y="636" fill="#e4e4e7">**** 5555</text>
    <text x="30" y="656" fill="#52525b" font-size="11">Showing 2 of 2,341</text>
  </g>
</svg>
